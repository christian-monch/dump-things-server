id: http://example.org/person-schema
name: person_schema
prefixes:
  abc: http://example.org/person-schema/abc/
  xyz: http://example.org/person-schema/xyz/
  trr379: http://example.org/person-schema/trr379/
  linkml: https://w3id.org/linkml/
imports:
  - linkml:types
default_range: string
default_prefix: abc


classes:
  Any:
    class_uri: "linkml:Any"

  Thing:
    attributes:
      id:
        identifier: true
        required: true
      relations:
        range: Any
        any_of:
          - range: string
          - range: Thing
        multivalued: true
        inlined: true
        inlined_as_list: false

  Agent:
    is_a: Thing
    attributes:
      acted_on_behalf_of:
        range: string
        multivalued: true

  InstantaneousEvent:
    is_a: Thing
    attributes:
      at_time:

  Person:
    is_a: Thing
    attributes:
      given_name:
